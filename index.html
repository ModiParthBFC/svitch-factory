<style>

    font:14px/1.4 "Segoe UI",system-ui,sans-serif; color:#e9e4d8;

  .hud{

  }

  .hbtn{
    padding:6px 14px; border:1px solid rgba(255,255,255,.2); border-radius:999px; font-size:12.5px;

  }
  .hbtn:hover{border-color:#7fb894; color:#aee5c3}
  .hbtn.on{background:#3f6b54; border-color:#3f6b54; color:#fff}

  #minimap{
    position:fixed; top:14px; right:14px; z-index:20; width:124px; height:340px;
    background:rgba(8,11,15,.85); border:1px solid rgba(255,255,255,.16); border-radius:10px;
    backdrop-filter:blur(6px); cursor:crosshair;

  #mmInner{position:absolute; left:12px; top:14px}
  #minimap .mm{position:absolute}

    position:absolute; width:0; height:0; z-index:5;
    border-left:5px solid transparent; border-right:5px solid transparent;

    margin-left:-5px; margin-top:-6px;

  #mmBike{
    position:absolute; width:7px; height:7px; border-radius:50%; z-index:4;

  }
  #mmLabel{
    position:absolute; left:8px; bottom:5px; font-size:9px; letter-spacing:.12em;
    color:#8b95a0; text-transform:uppercase;
  }

  #dpad{display:none; position:fixed; bottom:70px; left:50%; transform:translateX(-50%); z-index:20; gap:6px}
  #dpad .dbtn{
    width:52px; height:52px; border-radius:12px; background:rgba(10,13,18,.7);
    border:1px solid rgba(255,255,255,.2); color:#c3c9d1; font-size:19px;
  }
  @media (pointer:coarse){
    #dpad{display:flex}
    #hudKeys{display:none}
  }
  #vignette{
    position:fixed; inset:0; z-index:10; pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, rgba(0,0,0,0) 72%, rgba(4,7,12,.26));
  }
  .led{
    background:linear-gradient(115deg,#ff2d78,#7a3cff 30%,#00c8ff 55%,#ff9d2d 80%,#ff2d78);
    background-size:280% 100%;
    animation:ledpan 8s linear infinite;
  }
  @keyframes ledpan{from{background-position:0 0}to{background-position:-280% 0}}
  @media (prefers-reduced-motion: reduce){.led{animation:none}}
</style>

<script>
'use strict';
/* Svitch plant â€” EMPTY SHELL per plot plan.
   Hood spans volleyball-court end (north) â†’ Proposed Paint Shop (south): grid rows 1â€“23.
   x: 0 (west wall) â†’ 45 (east wall). z: 0 (north wall) â†’ 132 (south wall). 12 m to eaves. */
const S = 60;
const BW = 45, BL = 132, H = 12;
const P = 900;

const world = document.getElementById('world');
const scene = document.getElementById('scene');
const viewEl = document.getElementById('stageView');

/* ---------------------------------------------------------- primitives */
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
function hexRGB(hex){ const n = parseInt(hex.slice(1),16); return [n>>16&255, n>>8&255, n&255]; }
function shade(hex, f){
  const [r,g,b] = hexRGB(hex);
  const c = v => Math.round(clamp(v*f,0,255));
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}
function faceDiv(fw, fh, tf, bg, r){
  const f = document.createElement('div');
  f.className = 'face';
  f.style.cssText = `left:${-fw/2}px;top:${-fh/2}px;width:${fw}px;height:${fh}px;transform:${tf};background:${bg};`
    + (r ? `border-radius:${r}px;` : '');
  return f;
}
function boxDiv(b, parent){
  const el = document.createElement('div');
  el.className = 'box';
  const w = b.w*S, h = b.h*S, d = b.d*S;
  el.style.transform = `translate3d(${b.cx*S}px,${-(b.y+b.h/2)*S}px,${(b.cz||0)*S}px)`
    + (b.ry ? ` rotateY(${b.ry}deg)` : '') + (b.rz ? ` rotateZ(${b.rz}deg)` : '');
  const F = b.f || {};
  el.appendChild(faceDiv(w, h, `translateZ(${d/2}px)`,                F.front || shade(b.c,.92), b.r));
  el.appendChild(faceDiv(w, h, `rotateY(180deg) translateZ(${d/2}px)`, F.back  || shade(b.c,.62), b.r));
  el.appendChild(faceDiv(d, h, `rotateY(90deg) translateZ(${w/2}px)`,  F.right || shade(b.c,.82), b.r));
  el.appendChild(faceDiv(d, h, `rotateY(-90deg) translateZ(${w/2}px)`, F.left  || shade(b.c,.70), b.r));
  el.appendChild(faceDiv(w, d, `rotateX(90deg) translateZ(${h/2}px)`,  F.top   || shade(b.c,1.06), b.r));
  (parent || world).appendChild(el);
  return el;
}
function flat(cx, cz, w, d, ypx, bg, extra){
  // centre the element on its own origin, put the world position in the transform â€”
  // rotateX then happens about the correct point and the plane lies flat at (cx, cz)
  const f = document.createElement('div');
  f.className = 'flat3';
  f.style.cssText = `left:${-w*S/2}px;top:${-d*S/2}px;width:${w*S}px;height:${d*S}px;`
    + `transform:translate3d(${cx*S}px,${-ypx}px,${cz*S}px) rotateX(90deg);background:${bg};` + (extra||'');
  world.appendChild(f);
  return f;
}

/* text painted flat on the floor */
function floorText(cx, cz, text, px, color, rot){
  const el = document.createElement('div');
  el.className = 'flat3';
  const w = 700, h = px*1.6;
  el.style.cssText = `left:${-w/2}px;top:${-h/2}px;width:${w}px;height:${h}px;`
    + `transform:translate3d(${cx*S}px,-2.4px,${cz*S}px) rotateX(90deg)${rot ? ` rotateZ(${rot}deg)` : ''};`
    + `display:flex;align-items:center;justify-content:center;text-align:center;`
    + `font:700 ${px}px "Segoe UI",sans-serif;letter-spacing:.35em;color:${color};`;
  el.textContent = text;
  world.appendChild(el);
  return el;
}

/* ---------------------------------------------------------- empty shell */
function buildShell(){
  // concrete floor â€” small grid tiles so the GPU only rasterises what's on screen
  const conc = `repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 2px, rgba(0,0,0,0) 2px ${S*5}px),`
    + `repeating-linear-gradient(rgba(0,0,0,.05) 0 2px, rgba(0,0,0,0) 2px ${S*6}px), #a8abaf`;
  const FX = 3, FZ = 8, ftw = BW/FX, ftd = BL/FZ;
  for(let ix=0; ix<FX; ix++)
    for(let iz=0; iz<FZ; iz++)
      flat(ftw*(ix+0.5), ftd*(iz+0.5), ftw, ftd, 0, conc);

  // silver roof deck, facing down, tiled the same way; backface hidden so the overview sees inside
  for(let ix=0; ix<FX; ix++)
    for(let iz=0; iz<FZ; iz++){
      const ce = document.createElement('div');
      ce.className = 'flat3';
      ce.style.cssText = `left:${ftw*ix*S}px;top:${-ftd*S}px;width:${ftw*S}px;height:${ftd*S}px;transform-origin:0 100%;`
        + `transform:translate3d(0px,${-H*S}px,${ftd*iz*S}px) rotateX(-90deg);`
        + `background:repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 6px, rgba(0,0,0,0) 6px 26px), #a6abb2;`
        + `backface-visibility:hidden;`;
      world.appendChild(ce);
    }

  // silver corrugated walls (inward faces; backface-hidden = auto dollhouse in overview)
  const wallC = '#9aa0a8';
  const corr = `repeating-linear-gradient(90deg, ${shade(wallC,1.08)} 0 6px, ${wallC} 6px 26px), ${wallC}`;
  // walls tiled along their own axis; each segment's transform carries its offset
  const defs = [
    {len:BW, tf:s => `translate3d(${s*S}px,${-H*S}px,0px)`},
    {len:BL, tf:s => `translate3d(${BW*S}px,${-H*S}px,${s*S}px) rotateY(-90deg)`},
    {len:BW, tf:s => `translate3d(${(BW-s)*S}px,${-H*S}px,${BL*S}px) rotateY(180deg)`},
    {len:BL, tf:s => `translate3d(0px,${-H*S}px,${(BL-s)*S}px) rotateY(90deg)`},
  ];
  for(const wd of defs){
    const n = Math.ceil(wd.len/34), seg = wd.len/n;
    for(let i=0;i<n;i++){
      const el = document.createElement('div');
      el.className = 'face';
      el.style.cssText = `left:0;top:0;width:${seg*S}px;height:${H*S}px;transform-origin:0 0;`
        + `transform:${wd.tf(i*seg)};`
        + `background:linear-gradient(rgba(0,0,0,.28), rgba(0,0,0,0) 26%, rgba(0,0,0,.16) 92%), ${corr};`;
      world.appendChild(el);
    }
  }

  // steel column grid: two internal lines (x 15 / 30) every 12 m â€” first row starts AFTER
  // the truck entrance (gate spans 6â€“14 m), so the drive-in path is clear of pillars
  for(const x of [15, 30])
    for(let z=18; z<BL; z+=12)
      boxDiv({cx:x, cz:z, y:0, w:0.45, h:H-0.7, d:0.45, c:'#5d6670'});
  // roof trusses across the width every 12 m
  for(let z=6; z<BL; z+=12){
    boxDiv({cx:BW/2, cz:z, y:H-1.0, w:BW-1, h:0.55, d:0.36, c:'#767e88',
      f:{front:`repeating-linear-gradient(45deg, #868e98 0 4px, rgba(0,0,0,0) 4px 14px), #6d747c`,
         back:`repeating-linear-gradient(-45deg, #868e98 0 4px, rgba(0,0,0,0) 4px 14px), #6d747c`}});
  }
  // factory entry door â€” north wall, in the gap between the volleyball and badminton courts
  const DX = 22.5;
  boxDiv({cx:DX-0.68, cz:0.10, y:0, w:0.16, h:2.28, d:0.2, c:'#5d646e'});
  boxDiv({cx:DX+0.68, cz:0.10, y:0, w:0.16, h:2.28, d:0.2, c:'#5d646e'});
  boxDiv({cx:DX, cz:0.10, y:2.12, w:1.52, h:0.16, d:0.2, c:'#5d646e'});
  boxDiv({cx:DX, cz:0.11, y:0, w:1.2, h:2.1, d:0.09, c:'#6e7681', r:2,
    f:{front:'linear-gradient(rgba(0,0,0,.14),rgba(0,0,0,.14)) 50% 24% / 70% 30% no-repeat,'
      + 'linear-gradient(rgba(0,0,0,.14),rgba(0,0,0,.14)) 50% 74% / 70% 34% no-repeat, #6e7681'}});
  boxDiv({cx:DX+0.42, cz:0.18, y:0.95, w:0.06, h:0.2, d:0.07, c:'#2e3238'});
  const board = document.createElement('div');
  board.className = 'face';
  board.style.cssText = `left:${DX*S-1.3*S}px;top:${-(2.5+0.55)*S}px;width:${2.6*S}px;height:${0.55*S}px;`
    + `transform:translate3d(0,0,${0.14*S}px);display:flex;align-items:center;justify-content:center;`
    + `font:700 14px/1 "Segoe UI",sans-serif;letter-spacing:.22em;color:#eef1f4;white-space:nowrap;`
    + `background:#232a32;border:2px solid #4a545f;border-bottom:5px solid #ff5c8a;`;
  board.textContent = 'FACTORY ENTRY';
  world.appendChild(board);

  // big vehicle entrance â€” east wall beside the badminton area (hatched block on the plan)
  // 8 m wide Ã— 5 m tall, shutter rolled up: daylight visible through the opening
  const GZ = 10;
  boxDiv({cx:BW-0.16, cz:GZ, y:0, w:0.1, h:5, d:8, c:'#c5d4de',
    f:{left:'linear-gradient(#e2ecf3 0 58%, #c2d1c6 58% 66%, #9fae9a 66% 100%)'}});
  const hz = 'repeating-linear-gradient(45deg, #1c1c1c 0 10px, #d8a022 10px 20px)';
  boxDiv({cx:BW-0.55, cz:GZ-4.25, y:0, w:0.5, h:5.4, d:0.5, c:'#d8a022', f:{left:hz, front:hz, back:hz}});
  boxDiv({cx:BW-0.55, cz:GZ+4.25, y:0, w:0.5, h:5.4, d:0.5, c:'#d8a022', f:{left:hz, front:hz, back:hz}});
  boxDiv({cx:BW-0.55, cz:GZ, y:5.4, w:0.5, h:0.5, d:9.0, c:'#d8a022', f:{left:hz}});
  boxDiv({cx:BW-0.75, cz:GZ, y:5.05, w:0.8, h:0.8, d:8.6, c:'#8d939b', r:23});
  flat(BW-2.4, GZ, 3.6, 8.6, 0.4,
    'repeating-linear-gradient(45deg, rgba(216,160,34,.5) 0 14px, rgba(28,28,28,.35) 14px 28px)');
  const vb = document.createElement('div');
  vb.className = 'face';
  vb.style.cssText = `left:${-3.6*S/2}px;top:${-0.55*S/2}px;width:${3.6*S}px;height:${0.55*S}px;`
    + `transform:translate3d(${(BW-0.7)*S}px,${-6.6*S}px,${GZ*S}px) rotateY(-90deg);`
    + `display:flex;align-items:center;justify-content:center;white-space:nowrap;`
    + `font:700 14px/1 "Segoe UI",sans-serif;letter-spacing:.22em;color:#eef1f4;`
    + `background:#232a32;border:2px solid #4a545f;border-bottom:5px solid #ff5c8a;`;
  vb.textContent = 'VEHICLE GATE';
  world.appendChild(vb);

  // (no ground plane â€” a huge transformed layer starves the GPU and evicts the floor tiles)
}

/* ---------------------------------------------------------- assembly line (volleyball side, west band) */
function partBike(cx, cz, ry){
  // part-built CSR 762 â€” bare chassis on the conveyor (belt top = 0.55 m)
  const g = document.createElement('div');
  g.className = 'grp';
  g.style.transform = `translate3d(${cx*S}px,${-0.55*S}px,${cz*S}px) rotateY(${ry||0}deg)`;
  boxDiv({cx:0, cz:0.6, y:0, w:0.09, h:0.54, d:0.54, c:'#16181c', r:15}, g);
  boxDiv({cx:0, cz:-0.6, y:0, w:0.11, h:0.54, d:0.54, c:'#16181c', r:15}, g);
  boxDiv({cx:0, cz:0.03, y:0.3, w:0.22, h:0.36, d:0.9, c:'#9aa0a8', r:4}, g);
  boxDiv({cx:0, cz:0.48, y:0.85, w:0.5, h:0.045, d:0.045, c:'#5d646e'}, g);
  world.appendChild(g);
}
function workTable(cx, cz){
  boxDiv({cx, cz, y:0.72, w:1.8, h:0.08, d:0.9, c:'#a9825d', r:3});
  boxDiv({cx:cx-0.8, cz, y:0, w:0.08, h:0.72, d:0.8, c:'#6d747c'});
  boxDiv({cx:cx+0.8, cz, y:0, w:0.08, h:0.72, d:0.8, c:'#6d747c'});
  for(const dz of [-0.9, 0.9]) for(const dx of [-0.5, 0.5])
    boxDiv({cx:cx+dx, cz:cz+dz, y:0, w:0.34, h:0.5, d:0.34, c:'#46536b', r:8});
}
const LINE_TABLES = [21, 29, 37, 45, 53, 61, 69, 77, 85];
function buildAssembly(){
  // chain conveyor in the wallâ†’pillar band: 1st pillar row (18 m) â†’ 7th pillar row (90 m)
  boxDiv({cx:6.5, cz:54, y:0, w:1.5, h:0.55, d:72, c:'#3a4048',
    f:{top:'repeating-linear-gradient(rgba(0,0,0,.4) 0 4px, rgba(0,0,0,0) 4px 20px), #565d66'}});
  for(let z=19; z<=89; z+=3){
    boxDiv({cx:5.6, cz:z, y:0, w:0.14, h:0.95, d:0.14, c:'#7c848d'});
    boxDiv({cx:7.4, cz:z, y:0, w:0.14, h:0.95, d:0.14, c:'#7c848d'});
  }
  for(let z=22; z<=86; z+=8) partBike(6.5, z, 0);
  for(const z of LINE_TABLES) workTable(10.5, z);
  // RED BIN reject square beside the tables
  flat(10.5, 41, 2.4, 2.2, 0.5, 'rgba(216,74,62,.15)', 'border:3px solid #c0392b;');
}

/* ---------------------------------------------------------- open-air courts, north of the hood */
function net(cx, cz, len){
  boxDiv({cx, cz:cz-len/2, y:0, w:0.07, h:1.6, d:0.07, c:'#5d646e'});
  boxDiv({cx, cz:cz+len/2, y:0, w:0.07, h:1.6, d:0.07, c:'#5d646e'});
  boxDiv({cx, cz, y:1.05, w:0.02, h:0.5, d:len, c:'#dfe3e8',
    f:{left:'repeating-linear-gradient(rgba(0,0,0,.25) 0 2px, rgba(0,0,0,0) 2px 10px), rgba(235,239,244,.65)',
       right:'repeating-linear-gradient(rgba(0,0,0,.25) 0 2px, rgba(0,0,0,0) 2px 10px), rgba(235,239,244,.65)'}});
}
function buildCourts(){
  // courts are INSIDE the hood, first bay of the hall; entry-door walkway runs between them
  // volleyball â€” sand-painted court, net across the middle
  flat(14, 4, 13, 6, 0.4, '#b98d5f', 'box-shadow:inset 0 0 0 4px #f4efe6;');
  flat(14, 4, 0.09, 6, 0.8, '#f4efe6');
  net(14, 4, 6.8);
  // badminton â€” green court
  flat(30.5, 4, 13.2, 6.2, 0.4, '#3f7a55', 'box-shadow:inset 0 0 0 4px #f4efe6;');
  flat(30.5, 4, 0.09, 6.2, 0.8, '#f4efe6');
  flat(27.4, 4, 0.07, 6.2, 0.8, '#f4efe6');
  flat(33.6, 4, 0.07, 6.2, 0.8, '#f4efe6');
  net(30.5, 4, 6.8);
}

/* ---------------------------------------------------------- chassis reserve, east side (pillar 1 â†’ 5) */
const CHASSIS_X = [35.75, 37.95, 40.15, 42.35];   // 4 rows; 2 m walking gap kept at the east wall
function buildChassisReserve(){
  // pillar 1 (18 m) â†’ pillar 5 (66 m)
  for(const cx of CHASSIS_X)
    boxDiv({cx, cz:42, y:0, w:1.3, h:1.15, d:48, c:'#9aa3ac',
      f:{top:'repeating-linear-gradient(rgba(20,24,28,.55) 0 5px, rgba(0,0,0,0) 5px 16px), #aab3bc'}});
}

/* ---------------------------------------------------------- viewing / lounge deck (pillars 5â€“7, stock line â†’ east wall) */
const DECK = {x1:30, z1:66, x2:45, z2:90, h:4};
/* metal zig-zag stair starting at the 6th pillar (78 m), facing people arriving from
   the entrance: flight A (x 27.3â€“28.68) starts at z 78 and climbs south to a 2 m
   landing, flight B (x 28.72â€“30) doubles back north up to the deck at 4 m */
function deckSofa(cx, cz, ry, y0){

/* walkable ground height: 0 = floor, zig-zag ramps on the stair flights, 4 on the deck */
function groundY(x, z, cur){
  if(x >= 27.3 && x < 28.68 && z >= 78.1 && z < 82.5)
    return clamp((z - 78.1)/4.4*2, 0, 2);                       // flight A, up southwards
  if(x >= 27.3 && x < 30 && z >= 82.5 && z < 84.0) return 2;    // mid landing
  if(x >= 28.72 && x < 30 && z >= 77.9 && z < 82.5)
    return clamp(2 + (82.5 - z)/4.5*2, 2, DECK.h);              // flight B, back up northwards
  if(x >= DECK.x1 && z >= DECK.z1 && z <= DECK.z2) return cur > 2 ? DECK.h : 0;
  return 0;
}

const LAP = [[13, 75.4], [13, 106.5], [32, 106.5], [32, 75.4], [13, 75.4]];
let lapLens = [], lapTotal = 0, lapS = 0;
function lapPos(s){
  s = ((s % lapTotal) + lapTotal) % lapTotal;
  for(let i=0; i<lapLens.length; i++){
    if(s <= lapLens[i]){
      const [x1,z1] = LAP[i], [x2,z2] = LAP[i+1];
      const t = s/lapLens[i];
      return [x1+(x2-x1)*t, z1+(z2-z1)*t, Math.atan2(-(x2-x1), z2-z1)*180/Math.PI];
    }
    s -= lapLens[i];
  }
  return [LAP[0][0], LAP[0][1], 0];
}

function fence(x1, z1, x2, z2){
  const horiz = Math.abs(x2-x1) > Math.abs(z2-z1);

    + 'repeating-linear-gradient(-45deg, rgba(150,156,164,.6) 0 1.5px, rgba(0,0,0,0) 1.5px 11px)';
  boxDiv(horiz
    ? {cx, cz, y:0, w:len, h:4.4, d:0.04, c:'#8c929a', f:{front:mesh, back:mesh}}
    : {cx, cz, y:0, w:0.04, h:4.4, d:len, c:'#8c929a', f:{left:mesh, right:mesh}});
  boxDiv(horiz ? {cx, cz, y:4.42, w:len, h:0.15, d:0.09, c:'#6d747c'}
               : {cx, cz, y:4.42, w:0.09, h:0.15, d:len, c:'#6d747c'});

}

/* entries: [x1, z1, x2, z2, lvl] â€” lvl 1 = deck level only, lvl 2 = floor level only */
const SOLIDS = [
  [5.6, 17.8, 7.4, 90.2],                                  // conveyor
  ...LINE_TABLES.map(z => [9.5, z-1.3, 11.5, z+1.3]),      // worktables + stools

  ...Array.from({length:6}, (_,r) => 84 - r*1.3).flatMap(cz => [[14.7, cz-0.3, 21.8, cz+0.3], [23.3, cz-0.3, 26.4, cz+0.3]]),
  [42.8, 68.6, 44.2, 86.4, 2],                             // buffet counters (under deck)
  [43.0, 67.6, 44.7, 71.4, 1],                             // mocktail stall (on the deck, NE corner)
  [29.7, 15.9, 44.9, 16.1], [29.74, 16, 29.86, 54.1],      // 15 ft fence â€” gate side + pillar run
  [26.74, 53.9, 29.86, 54.1], [26.74, 54, 26.86, 66],      // fence jog + offset run
  [26.7, 65.9, 30.3, 66.1],                                // fence close at the deck corner
  [34.9, 102.6, 40.6, 110.4],                              // parked display bikes
  [38.3, 122.1, 44.6, 122.5],                              // media-corner rope line (entry gap on the west)
  [32.5, 87.7, 42.7, 89.5, 1],                             // press row on the deck
];
function collide(nx, nz, gy){
  const r = 0.45;
  nx = clamp(nx, 1.1, BW-1.1); nz = clamp(nz, 1.1, BL-1.1);
  for(const [x1,z1,x2,z2,lvl] of SOLIDS){
    if(lvl === 1 && gy < 2) continue;
    if(lvl === 2 && gy > 2) continue;
    if(nx > x1-r && nx < x2+r && nz > z1-r && nz < z2+r){
      const dl = nx-(x1-r), dr = (x2+r)-nx, dt = nz-(z1-r), db = (z2+r)-nz;
      const m = Math.min(dl, dr, dt, db);
      if(m === dl) nx = x1-r; else if(m === dr) nx = x2+r;
      else if(m === dt) nz = z1-r; else nz = z2+r;
    }
  }
  return [nx, nz];
}

/* ---------------------------------------------------------- camera & modes */
const cam = {x:22.5, z:2.6, yaw:180, pitch:2};   // spawn just inside the entry door
let camGy = 0, camYs = 0;                        // logical + smoothed ground height (deck walking)
let mode = 'walk';
const over = {yaw:18, pitch:-42, zoom:0.06};
const keys = {};

function applyCam(){
  if(mode === 'walk'){
    scene.style.transform =
      `translateZ(${P}px) rotateX(${-cam.pitch}deg) rotateY(${-cam.yaw}deg)`
      + ` translate3d(${-cam.x*S}px,${(1.62+camYs)*S}px,${-cam.z*S}px)`;
  }else{
    scene.style.transform =
      `scale3d(${over.zoom},${over.zoom},${over.zoom}) rotateX(${over.pitch}deg) rotateY(${over.yaw}deg)`
      + ` translate3d(${-BW*S/2}px,${H*S*0.45}px,${-BL*S/2}px)`;
  }
}
function setMode(m){
  mode = m;
  document.getElementById('btnWalk').classList.toggle('on', m === 'walk');
  document.getElementById('btnOver').classList.toggle('on', m === 'over');
  if(m === 'over'){
    const pw = viewEl.clientWidth, ph = viewEl.clientHeight;
    over.zoom = clamp(Math.min(pw*0.8/(BW*S*2.4), ph*0.85/(BL*S*0.8)), 0.02, 0.5);
  }
  applyCam();
}
document.getElementById('btnWalk').addEventListener('click', () => setMode('walk'));
document.getElementById('btnOver').addEventListener('click', () => setMode('over'));
document.getElementById('btnSpawn').addEventListener('click', () => {
  cam.x = 22.5; cam.z = 2.6; cam.yaw = 180; cam.pitch = 2; camGy = 0; camYs = 0; setMode('walk');
});

let look = null;
viewEl.addEventListener('pointerdown', e => {
  look = {x:e.clientX, y:e.clientY};
  viewEl.setPointerCapture(e.pointerId);
});
viewEl.addEventListener('pointermove', e => {
  if(!look) return;
  const dx = e.clientX - look.x, dy = e.clientY - look.y;
  look = {x:e.clientX, y:e.clientY};
  if(mode === 'walk'){
    cam.yaw -= dx*0.24;
    cam.pitch = clamp(cam.pitch - dy*0.16, -38, 38);
  }else{
    over.yaw += dx*0.4;
    over.pitch = clamp(over.pitch + dy*0.3, -88, -6);
  }
  applyCam();
});
viewEl.addEventListener('pointerup', () => look = null);
viewEl.addEventListener('pointercancel', () => look = null);
viewEl.addEventListener('wheel', e => {
  e.preventDefault();
  if(mode === 'over'){
    over.zoom = clamp(over.zoom*Math.exp(-e.deltaY*0.0011), 0.012, 0.6);
    applyCam();
  }
}, {passive:false});

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if(k === 'v'){ setMode(mode === 'walk' ? 'over' : 'walk'); return; }
  keys[k] = true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
document.querySelectorAll('#dpad .dbtn').forEach(b => {
  const k = b.dataset.k;
  b.addEventListener('pointerdown', e => { e.preventDefault(); keys[k] = true; });
  b.addEventListener('pointerup', () => keys[k] = false);
  b.addEventListener('pointercancel', () => keys[k] = false);
});

/* ---------------------------------------------------------- walk loop (empty hall: walls only) */
let last = performance.now();
const mmPlayer = document.getElementById('mmPlayer');
const mmOff = {x:12, y:14};
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

function tick(now){
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;
  if(mode === 'walk'){
    const run = keys['shift'] ? 9 : 4.4;
    const rad = cam.yaw*Math.PI/180;
    const fx = -Math.sin(rad), fz = -Math.cos(rad);
    const rx = Math.cos(rad),  rz = -Math.sin(rad);
    let mx = 0, mz = 0;
    if(keys['w'] || keys['arrowup'])    { mx += fx; mz += fz; }
    if(keys['s'] || keys['arrowdown'])  { mx -= fx; mz -= fz; }
    if(keys['a'] || keys['arrowleft'])  { mx -= rx; mz -= rz; }
    if(keys['d'] || keys['arrowright']) { mx += rx; mz += rz; }
    const len = Math.hypot(mx, mz);
    if(len > 0.01){
      const [nx, nz] = collide(cam.x + mx/len*run*dt, cam.z + mz/len*run*dt, camGy);
      const gy = groundY(nx, nz, camGy);
      // stairs change level smoothly; a sudden jump (deck edge) blocks the move
      if(Math.abs(gy - camGy) < 1.2){
        cam.x = nx; cam.z = nz; camGy = gy;
      }
    }
    camYs += (camGy - camYs)*Math.min(1, dt*12);
    applyCam();
  }
  if(!reduceMotion){
    plinthAng += 14*dt;
    plinthEl.style.transform = plinthEl.dataset.base + ` rotateY(${plinthAng}deg)`;
  }
  mmPlayer.style.left = (mmOff.x + cam.x*MM)+'px';
  mmPlayer.style.top = (mmOff.y + cam.z*MM)+'px';
  mmPlayer.style.transform = `rotate(${-cam.yaw}deg)`;
  requestAnimationFrame(tick);
}

buildEvent();
buildParkedBikes();
buildFences();
buildSideDoors();
buildMinimap();
applyCam();
requestAnimationFrame(tick);
window.addEventListener('resize', () => { if(mode === 'over') setMode('over'); });
